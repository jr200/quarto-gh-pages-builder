name: publish-uv-pypi

on:
  repository_dispatch:
    types:
      - dispatch-publish-uv-pypi

  workflow_dispatch:
    inputs:
      checkout-ref:
        description: "checkout ref"
        required: false
        type: string
        default: "refs/heads/master"
      build-args:
        description: "build-args"
        required: false
        type: string
        default: -v
      publish-args:
        description: "publish-args"
        required: false
        type: string
        default: -vvv


jobs:
  configure:
    uses: jr200/github-action-templates/.github/workflows/preconfigure.yml@main
    with:
      event_name: ${{ toJson(github.event_name) }}
      event: ${{ toJson(github.event) }}

  main:
    needs: configure
    uses: jr200/github-action-templates/.github/workflows/publish_uv_pypi.yml@main
    with:
      checkout-ref: ${{ fromJson(needs.configure.outputs.context).checkout-ref }}
      build-args: ${{ fromJson(needs.configure.outputs.context).build-args }}
      publish-args: ${{ fromJson(needs.configure.outputs.context).publish-args }}
    secrets:
      pypi_api_token: ${{ secrets.PYPI_API_TOKEN }}
